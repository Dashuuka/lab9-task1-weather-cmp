name: task1_weather_cmp CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-web:
    name: Android and Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print tool versions
        run: |
          java -version
          ./gradlew --version

      - name: Run all available tests
        run: ./gradlew :composeApp:allTests :composeApp:testDebugUnitTest :composeApp:wasmJsTest --stacktrace

      - name: Print test results
        if: always()
        run: |
          find composeApp/build/test-results -name "*.xml" -print || true
          grep -R "<testsuite" composeApp/build/test-results || true

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: List Web/Wasm Gradle tasks
        shell: bash
        run: ./gradlew :composeApp:tasks --all | grep -Ei "wasm|js|browser|distribution|webpack" || true

      - name: Build Web/Wasm
        shell: bash
        run: |
          if ./gradlew :composeApp:tasks --all | grep -q "wasmJsBrowserDistribution"; then
            ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace
          elif ./gradlew :composeApp:tasks --all | grep -q "jsBrowserDistribution"; then
            ./gradlew :composeApp:jsBrowserDistribution --stacktrace
          else
            echo "ERROR: neither wasmJsBrowserDistribution nor jsBrowserDistribution exists." >&2
            exit 1
          fi

      - name: Prepare Pages content
        shell: bash
        run: |
          mkdir -p pages
          echo "All generated index.html files:"
          find composeApp/build -name index.html -print
          echo "First files under composeApp/build/dist:"
          find composeApp/build/dist -maxdepth 6 -type f | sort | head -200 || true
          echo "Searching for Wasm index.html:"
          find composeApp/build -path '*wasmJs*' -name index.html -print
          INDEX_FILE="$(find composeApp/build -path '*wasmJs*' -name index.html | head -n 1)"
          if [ -z "$INDEX_FILE" ]; then
            INDEX_FILE="$(find composeApp/build -path '*js*' -name index.html | head -n 1)"
          fi
          if [ -z "$INDEX_FILE" ]; then
            echo "ERROR: Web/Wasm index.html was not found under composeApp/build. GitHub Pages artifact cannot be prepared." >&2
            exit 1
          fi
          PUBLISH_SOURCE="$(dirname "$INDEX_FILE")"
          echo "Copying Pages content from: $PUBLISH_SOURCE"
          cp -R "$PUBLISH_SOURCE"/. pages/

      - name: Verify Pages publish directory
        shell: bash
        run: |
          pwd
          echo "Pages publish directory:"
          find pages -maxdepth 2 -type f -print
          test -f pages/index.html || {
            echo "ERROR: pages/index.html is missing. The Pages artifact root must contain index.html." >&2
            exit 1
          }

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-android-apk
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload Web/Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-web-wasm
          path: pages/**
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-test-reports
          path: |
            composeApp/build/reports/tests/**
            composeApp/build/test-results/**
          if-no-files-found: ignore

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy Pages
        id: deployment
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

      - name: Print Pages URL
        if: github.event_name != 'pull_request'
        run: |
          echo "Published Pages URL: ${{ steps.deployment.outputs.page_url }}"

  windows-desktop:
    name: Windows Desktop runnable artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Print tool versions
        shell: pwsh
        run: |
          java -version
          .\gradlew.bat --version

      - name: Build runnable Windows Desktop artifact
        shell: pwsh
        run: |
          $tasks = .\gradlew.bat tasks --all
          if ($tasks -match "packageUberJarForCurrentOS") {
            .\gradlew.bat :composeApp:packageUberJarForCurrentOS --stacktrace
          } elseif ($tasks -match "createDistributable") {
            .\gradlew.bat :composeApp:createDistributable --stacktrace
          } elseif ($tasks -match "packageDistributionForCurrentOS") {
            .\gradlew.bat :composeApp:packageDistributionForCurrentOS --stacktrace
          } else {
            throw "No runnable Desktop packaging task found."
          }

      - name: Upload Windows Desktop runnable artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-desktop-windows-runnable
          path: |
            composeApp/build/compose/jars/**/*.jar
            composeApp/build/compose/binaries/**
          if-no-files-found: error

  ios-simulator:
    name: iOS simulator app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print tool versions
        run: |
          java -version
          ./gradlew --version
          xcodebuild -version

      - name: Build iOS simulator app
        shell: bash
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath iosApp/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Stage iOS simulator .app
        shell: bash
        run: |
          mkdir -p ios-artifact
          APP_PATH="$(find iosApp/build/Build/Products -path '*iphonesimulator/*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app folder found in Xcode build output." >&2
            find iosApp/build -maxdepth 6 -print || true
            exit 1
          fi
          cp -R "$APP_PATH" ios-artifact/
          echo "Staged iOS app:"
          find ios-artifact -maxdepth 3 -print
          test -d ios-artifact/*.app

      - name: Upload iOS simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-ios-simulator-app
          path: ios-artifact/**
          if-no-files-found: error
