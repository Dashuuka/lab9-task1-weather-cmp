name: task1_weather_cmp CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-web:
    name: Android and Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print tool versions
        run: |
          java -version
          ./gradlew --version

      - name: Run desktop tests
        run: ./gradlew :composeApp:desktopTest --stacktrace

      - name: Print test results
        if: always()
        run: |
          find composeApp/build/test-results -name "*.xml" -print || true
          grep -R "<testsuite" composeApp/build/test-results || true

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Build Web/Wasm if task exists
        shell: bash
        run: |
          if ./gradlew tasks --all | grep -q "wasmJsBrowserDistribution"; then
            ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace
          elif ./gradlew tasks --all | grep -q "wasmJsBrowserProductionWebpack"; then
            ./gradlew :composeApp:wasmJsBrowserProductionWebpack --stacktrace
          else
            echo "No Web/Wasm build task found, skipping."
          fi

      - name: Prepare Pages content
        shell: bash
        run: |
          mkdir -p pages/lab9-task1-weather-cmp
          if [ -d composeApp/build/dist/wasmJs/productionExecutable ]; then
            cp -R composeApp/build/dist/wasmJs/productionExecutable/. pages/lab9-task1-weather-cmp/
          elif [ -d composeApp/build/dist/wasmJs/developmentExecutable ]; then
            cp -R composeApp/build/dist/wasmJs/developmentExecutable/. pages/lab9-task1-weather-cmp/
          else
            echo "<html><body><h1>task1_weather_cmp</h1><p>Wasm output was not produced.</p></body></html>" > pages/lab9-task1-weather-cmp/index.html
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-android-apk
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload Web/Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-web-wasm
          path: pages/lab9-task1-weather-cmp/**
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-test-reports
          path: |
            composeApp/build/reports/tests/**
            composeApp/build/test-results/**
          if-no-files-found: ignore

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy Pages
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

  windows-desktop:
    name: Windows Desktop runnable artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Print tool versions
        shell: pwsh
        run: |
          java -version
          .\gradlew.bat --version

      - name: Build runnable Windows Desktop artifact
        shell: pwsh
        run: |
          $tasks = .\gradlew.bat tasks --all
          if ($tasks -match "packageUberJarForCurrentOS") {
            .\gradlew.bat :composeApp:packageUberJarForCurrentOS --stacktrace
          } elseif ($tasks -match "createDistributable") {
            .\gradlew.bat :composeApp:createDistributable --stacktrace
          } elseif ($tasks -match "packageDistributionForCurrentOS") {
            .\gradlew.bat :composeApp:packageDistributionForCurrentOS --stacktrace
          } else {
            throw "No runnable Desktop packaging task found."
          }

      - name: Upload Windows Desktop runnable artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-desktop-windows-runnable
          path: |
            composeApp/build/compose/jars/**/*.jar
            composeApp/build/compose/binaries/**
          if-no-files-found: error

  ios-framework-check:
    name: iOS framework/compile check on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Print tool versions
        run: |
          java -version
          ./gradlew --version
          xcodebuild -version

      - name: Build iOS simulator framework or compile target
        shell: bash
        run: |
          if ./gradlew tasks --all | grep -q "linkDebugFrameworkIosSimulatorArm64"; then
            ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace
          elif ./gradlew tasks --all | grep -q "compileKotlinIosSimulatorArm64"; then
            ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --stacktrace
          else
            echo "No suitable iOS framework/check Gradle task found." >&2
            exit 1
          fi

      - name: Upload iOS framework/check artifact
        uses: actions/upload-artifact@v4
        with:
          name: task1-weather-ios-framework-check
          path: composeApp/build/bin/ios*/**
          if-no-files-found: error
